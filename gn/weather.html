<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>于桐天气 | Pro Dashboard</title>
    
    <!-- 极速资源预连接 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- 字体与图标 -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
    
    <style>
        /* ================= 1. Design Tokens ================= */
        :root {
            --seed-h: 230; 
            --seed-s: 25%;
            --primary: hsl(var(--seed-h), var(--seed-s), 40%);
            --on-primary: #ffffff;
            --primary-container: hsl(var(--seed-h), var(--seed-s), 90%);
            --on-primary-container: hsl(var(--seed-h), var(--seed-s), 10%);
            --surface: hsl(var(--seed-h), 10%, 98%);
            --surface-container: hsl(var(--seed-h), 15%, 95%);
            --surface-container-high: hsl(var(--seed-h), 15%, 92%);
            --on-surface: hsl(var(--seed-h), 10%, 10%);
            --on-surface-variant: hsl(var(--seed-h), 5%, 40%);
            --outline: hsl(var(--seed-h), 10%, 80%);
            --ease-spring: cubic-bezier(0.175, 0.885, 0.32, 1.1);
            --ease-standard: cubic-bezier(0.2, 0, 0, 1);
        }

        body.dark-mode {
            --primary: hsl(var(--seed-h), var(--seed-s), 80%);
            --on-primary: hsl(var(--seed-h), var(--seed-s), 20%);
            --primary-container: hsl(var(--seed-h), var(--seed-s), 30%);
            --on-primary-container: hsl(var(--seed-h), var(--seed-s), 90%);
            --surface: hsl(var(--seed-h), 10%, 6%);
            --surface-container: hsl(var(--seed-h), 10%, 12%);
            --surface-container-high: hsl(var(--seed-h), 10%, 17%);
            --on-surface: hsl(var(--seed-h), 10%, 90%);
            --on-surface-variant: hsl(var(--seed-h), 5%, 70%);
            --outline: hsl(var(--seed-h), 10%, 30%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Google Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--surface);
            color: var(--on-surface);
            transition: background-color 0.5s var(--ease-standard), color 0.5s var(--ease-standard);
            min-height: 100vh;
            overflow-x: hidden; /* 防止横向滚动 */
        }

        .app-shell {
            max-width: 1440px;
            margin: 0 auto;
            padding: 16px;
            display: grid;
            gap: 20px;
            grid-template-areas: 
                "header"
                "current"
                "details"
                "hourly"
                "daily";
        }

        /* 电脑大分辨率适配优化 */
        @media (min-width: 1024px) {
            .app-shell {
                padding: 24px;
                grid-template-columns: 320px 1fr 1fr; /* 三栏布局 */
                grid-template-rows: auto 1fr auto;
                grid-template-areas: 
                    "header header header"
                    "current details daily"
                    "current hourly daily";
            }
            #panel-current {
                grid-area: current;
                position: sticky;
                top: 24px;
                height: calc(100vh - 120px);
                max-height: 800px;
            }
            #panel-details { grid-area: details; }
            #panel-hourly { grid-area: hourly; }
            #panel-daily { grid-area: daily; }
        }

        #section-header { grid-area: header; }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface-container);
            padding: 8px 16px;
            border-radius: 100px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            position: relative;
            z-index: 100;
            width: 100%;
        }

        .search-wrapper {
            flex-grow: 1;
            display: flex;
            align-items: center;
            height: 48px;
        }

        .search-wrapper input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            height: 100%;
            margin-left: 12px;
            font-size: 16px;
            color: var(--on-surface);
        }

        .icon-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--on-surface);
            cursor: pointer;
            display: grid; place-items: center;
            transition: background 0.2s;
        }
        .icon-btn:hover { background: rgba(0,0,0,0.1); }

        .card {
            background: var(--surface-container);
            border-radius: 28px;
            padding: 24px;
            transition: transform 0.3s var(--ease-spring), opacity 0.5s ease;
            opacity: 0; animation: fadeUp 0.6s var(--ease-spring) forwards;
            overflow: hidden;
        }
        
        .card-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--on-surface-variant);
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        #panel-current {
            background: var(--primary-container);
            color: var(--on-primary-container);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .location-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px; border-radius: 20px;
            font-size: 14px; font-weight: 500;
            cursor: pointer; transition: all 0.3s;
            margin-bottom: 24px;
        }
        body.dark-mode .location-badge { background: rgba(0,0,0,0.2); }
        .location-badge:hover { transform: scale(1.05); filter: brightness(1.1); }
        .location-badge.active { background: var(--primary); color: white; }

        .big-temp {
            font-size: 80px; font-weight: 400; line-height: 1;
            margin: 10px 0; letter-spacing: -4px;
        }
        
        .weather-status {
            font-size: 20px; margin-bottom: 20px; opacity: 0.9;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }
        .stat-box {
            background: var(--surface-container-high);
            padding: 12px; border-radius: 16px;
            display: flex; flex-direction: column; align-items: flex-start;
        }
        .stat-label { font-size: 11px; opacity: 0.7; margin-bottom: 2px; }
        .stat-val { font-size: 16px; font-weight: 600; }

        .hourly-scroll {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 8px;
            scrollbar-width: thin;
            scrollbar-color: var(--outline) transparent;
        }

        .hour-item {
            display: flex; flex-direction: column; align-items: center;
            min-width: 50px; flex-shrink: 0;
        }
        
        .day-row {
            display: grid;
            grid-template-columns: 60px 30px 1fr 70px;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--outline);
        }
        .day-row:last-child { border-bottom: none; }
        
        .temp-track {
            height: 4px; background: rgba(0,0,0,0.05); border-radius: 2px;
            margin: 0 12px; position: relative;
        }
        .temp-fill {
            position: absolute; height: 100%; background: var(--primary);
            border-radius: 2px; opacity: 0.7;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--surface-container) 25%, var(--outline) 50%, var(--surface-container) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px; color: transparent !important;
        }
        @keyframes shimmer { 0% {background-position: 200% 0} 100% {background-position: -200% 0} }

        .search-results {
            position: absolute; top: 60px; left: 0; right: 0;
            background: var(--surface-container-high);
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            overflow: hidden; display: none; z-index: 200;
        }
        .search-results.show { display: block; animation: fadeUp 0.2s ease; }
        .result-item { padding: 14px 20px; border-bottom: 1px solid rgba(0,0,0,0.05); cursor: pointer; }
        .result-item:hover { background: var(--surface); }

        .bottom-sheet-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.4);
            z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            display: flex; align-items: flex-end; justify-content: center;
            backdrop-filter: blur(4px);
        }
        .bottom-sheet-overlay.active { opacity: 1; pointer-events: all; }
        .sheet-content {
            background: var(--surface);
            width: 100%; max-width: 600px;
            border-radius: 32px 32px 0 0;
            padding: 32px;
            transform: translateY(100%); transition: transform 0.4s var(--ease-spring);
        }
        .bottom-sheet-overlay.active .sheet-content { transform: translateY(0); }

        .palette { display: flex; gap: 16px; margin: 24px 0; overflow-x: auto; padding-bottom: 10px; }
        .color-dot {
            width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
            cursor: pointer; transition: transform 0.2s;
        }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="section-header">
        <div class="top-bar">
            <div class="search-wrapper">
                <span class="material-symbols-rounded" style="opacity:0.5">search</span>
                <input type="text" id="input-city" placeholder="搜索城市 / 地区..." autocomplete="off">
            </div>
            <button class="icon-btn" id="btn-theme"><span class="material-symbols-rounded">palette</span></button>
            <div class="search-results" id="search-box"></div>
        </div>
    </div>

    <div id="panel-current" class="card">
        <div>
            <div class="location-badge" id="btn-loc">
                <span class="material-symbols-rounded" id="icon-loc">near_me</span>
                <span id="text-loc">定位中...</span>
            </div>
            <div id="hero-content">
                <div class="skeleton" style="width:120px; height:120px; margin: 20px auto; border-radius:50%"></div>
                <div class="skeleton" style="width:100px; height:80px; margin: 0 auto;"></div>
            </div>
        </div>
        <div style="font-size:12px; opacity:0.6; margin-top:20px;">于桐天气 Pro Dashboard</div>
    </div>

    <div id="panel-details" class="card">
        <div class="card-title"><span class="material-symbols-rounded">grid_view</span> 详细指标</div>
        <div class="grid-stats" id="box-details"></div>
    </div>

    <div id="panel-hourly" class="card">
        <div class="card-title"><span class="material-symbols-rounded">schedule</span> 逐小时预报</div>
        <div class="hourly-scroll" id="box-hourly"></div>
    </div>

    <div id="panel-daily" class="card">
        <div class="card-title"><span class="material-symbols-rounded">calendar_month</span> 7日天气趋势</div>
        <div id="box-daily"></div>
    </div>
</div>

<div class="bottom-sheet-overlay" id="modal-settings">
    <div class="sheet-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px">
            <h3>个性化</h3>
            <span class="material-symbols-rounded" style="cursor:pointer" onclick="toggleModal(false)">close</span>
        </div>
        <div class="palette" id="box-palette"></div>
        <div style="background:var(--surface-container-high); padding:16px; border-radius:16px; display:flex; justify-content:space-between; align-items:center;">
            <span>深色模式</span>
            <span class="material-symbols-rounded" id="btn-dark" style="font-size:32px; cursor:pointer">toggle_off</span>
        </div>
    </div>
</div>

<script>
    const API_KEY = "80e49589601a4bb581ee45d2aa5d81a7";
    const Store = {
        city: JSON.parse(localStorage.getItem('pro_city')) || {id:"101010100", name:"北京", adm1:"北京市"},
        isDark: localStorage.getItem('pro_dark') === 'true',
        seed: localStorage.getItem('pro_seed') || '230',
        tracking: localStorage.getItem('pro_track') !== 'false', 
        manual: localStorage.getItem('pro_manual') === 'true', 
        watchId: null
    };

    const COLORS = [
        {h:230,c:'#4285F4'}, {h:210,c:'#03A9F4'}, {h:180,c:'#00BCD4'}, 
        {h:150,c:'#009688'}, {h:100,c:'#4CAF50'}, {h:45,c:'#FFC107'},
        {h:25,c:'#FF5722'}, {h:340,c:'#E91E63'}
    ];

    function getIcon(code) {
        const map = {
            '100': 'wi-day-sunny', '101': 'wi-cloudy', '102': 'wi-day-cloudy', '103': 'wi-day-cloudy-high', '104': 'wi-cloud',
            '150': 'wi-night-clear', '151': 'wi-night-alt-cloudy', '154': 'wi-night-cloudy',
            '300': 'wi-rain', '302': 'wi-thunderstorm', '305': 'wi-rain-mix', '306': 'wi-rain',
            '400': 'wi-snow', '404': 'wi-sleet', '501': 'wi-fog', '502': 'wi-smog'
        };
        return map[code] || 'wi-day-cloudy';
    }

    async function fetchWeather(cid) {
        try {
            const [now, h24, d7, air] = await Promise.all([
                fetch(`https://devapi.qweather.com/v7/weather/now?location=${cid}&key=${API_KEY}`).then(r=>r.json()),
                fetch(`https://devapi.qweather.com/v7/weather/24h?location=${cid}&key=${API_KEY}`).then(r=>r.json()),
                fetch(`https://devapi.qweather.com/v7/weather/7d?location=${cid}&key=${API_KEY}`).then(r=>r.json()),
                fetch(`https://devapi.qweather.com/v7/air/now?location=${cid}&key=${API_KEY}`).then(r=>r.json()).catch(()=>({}))
            ]);

            if(now.code === '200') {
                renderHero(now.now, d7.daily?.[0]);
                renderDetails(now.now, d7.daily?.[0], air?.now);
                renderHourly(h24.hourly || []);
                renderDaily(d7.daily || []);
            }
        } catch(e) { console.error("Weather fetch failed:", e); }
    }

    function renderHero(n, today) {
        document.getElementById('hero-content').innerHTML = `
            <i class="wi ${getIcon(n.icon)}" style="font-size:72px; margin:16px 0; display:block; color:var(--on-primary-container)"></i>
            <div class="weather-status"><span>${n.text}</span></div>
            <div class="big-temp">${n.temp}°</div>
            <div style="opacity:0.8; font-size:14px;">${today ? `最高 ${today.tempMax}° / 最低 ${today.tempMin}°` : ''}</div>
        `;
    }

    function renderDetails(n, today, air) {
        const stats = [
            {l:'体感', v:`${n.feelsLike}°`}, {l:'湿度', v:`${n.humidity}%`},
            {l:'风速', v:`${n.windScale}级`}, {l:'气压', v:`${n.pressure}hPa`},
            {l:'能见度', v:`${n.vis}km`}, {l:'降水', v:`${n.precip}mm`}
        ];
        if(air?.aqi) stats.push({l:'AQI', v: air.aqi});
        if(today?.uvIndex) stats.push({l:'紫外线', v: today.uvIndex});

        document.getElementById('box-details').innerHTML = stats.map(s => `
            <div class="stat-box">
                <div class="stat-label">${s.l}</div>
                <div class="stat-val">${s.v}</div>
            </div>
        `).join('');
    }

    function renderHourly(list) {
        document.getElementById('box-hourly').innerHTML = list.map(h => `
            <div class="hour-item">
                <span style="font-size:11px; opacity:0.7">${h.fxTime.slice(11,13)}:00</span>
                <i class="wi ${getIcon(h.icon)}" style="font-size:22px; margin:8px 0; color:var(--primary)"></i>
                <span style="font-weight:600">${h.temp}°</span>
            </div>
        `).join('');
    }

    function renderDaily(list) {
        if(!list.length) return;
        const max = Math.max(...list.map(d=>parseInt(d.tempMax)));
        const min = Math.min(...list.map(d=>parseInt(d.tempMin)));
        const range = max - min || 1;

        document.getElementById('box-daily').innerHTML = list.map(d => {
            const w = ((parseInt(d.tempMax) - parseInt(d.tempMin))/range)*100;
            const l = ((parseInt(d.tempMin) - min)/range)*100;
            return `
            <div class="day-row">
                <div style="font-weight:500; font-size: 13px;">${new Date(d.fxDate).toLocaleDateString('zh-CN',{weekday:'short'})}</div>
                <div style="text-align:center"><i class="wi ${getIcon(d.iconDay)}" style="font-size:16px; color:var(--primary)"></i></div>
                <div class="temp-track"><div class="temp-fill" style="left:${l}%; width:${w}%"></div></div>
                <div style="text-align:right; font-size:12px; font-weight:500">${d.tempMin}° / ${d.tempMax}°</div>
            </div>`;
        }).join('');
    }

    async function searchCity(kw) {
        const box = document.getElementById('search-box');
        if(!kw) return box.classList.remove('show');
        try {
            const res = await fetch(`https://geoapi.qweather.com/v2/city/lookup?location=${kw}&key=${API_KEY}`).then(r=>r.json());
            if(res.location) {
                box.innerHTML = res.location.map(c => 
                    `<div class="result-item" onclick='setCity(${JSON.stringify(c)})'>
                        <strong>${c.name}</strong> <small>${c.adm1}</small>
                    </div>`
                ).join('');
                box.classList.add('show');
            }
        } catch(e){}
    }

    function setCity(c) {
        Store.city = c;
        Store.manual = true; 
        localStorage.setItem('pro_city', JSON.stringify(c));
        localStorage.setItem('pro_manual', 'true');
        document.getElementById('search-box').classList.remove('show');
        document.getElementById('input-city').value = '';
        fetchWeather(c.id);
        updateLocUI();
    }

    function toggleLoc() {
        if (Store.manual) {
            Store.manual = false;
            Store.tracking = true;
            localStorage.setItem('pro_manual', 'false');
            localStorage.setItem('pro_track', 'true');
            document.getElementById('text-loc').innerText = "定位中...";
            startLoc(false); 
        } else {
            Store.tracking = !Store.tracking;
            localStorage.setItem('pro_track', Store.tracking);
            if (Store.tracking) startLoc(false); else stopLoc();
        }
        updateLocUI();
    }

    function startLoc(isInit) {
        if(!navigator.geolocation) return;
        const options = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };
        navigator.geolocation.getCurrentPosition(
            handlePos, 
            (err) => { 
                console.warn("Location error:", err);
                if(!isInit) document.getElementById('text-loc').innerText = "定位失败";
            }, 
            options
        );
        if (Store.watchId) navigator.geolocation.clearWatch(Store.watchId);
        Store.watchId = navigator.geolocation.watchPosition(handlePos, null, options);
    }

    async function handlePos(pos) {
        if (Store.manual || !Store.tracking) return;
        const {latitude, longitude} = pos.coords;
        try {
            const res = await fetch(`https://geoapi.qweather.com/v2/city/lookup?location=${longitude.toFixed(2)},${latitude.toFixed(2)}&key=${API_KEY}`).then(r=>r.json());
            if(res.code==='200' && res.location?.[0]) {
                const newCity = res.location[0];
                if (newCity.id !== Store.city.id || document.getElementById('text-loc').innerText.includes("中")) {
                    Store.city = newCity;
                    localStorage.setItem('pro_city', JSON.stringify(newCity));
                    fetchWeather(newCity.id);
                    updateLocUI();
                }
            }
        } catch(e){}
    }

    function stopLoc() {
        if(Store.watchId) navigator.geolocation.clearWatch(Store.watchId);
        Store.watchId = null;
    }

    function updateLocUI() {
        const txt = document.getElementById('text-loc');
        const icon = document.getElementById('icon-loc');
        const badge = document.getElementById('btn-loc');
        
        badge.classList.remove('active');
        if(Store.manual) {
            txt.innerText = '返回当前位置'; icon.innerText='my_location';
        } else if(Store.tracking) {
            txt.innerText = Store.city.name; icon.innerText='near_me';
            badge.classList.add('active');
        } else {
            txt.innerText = '定位已禁用'; icon.innerText='location_disabled';
        }
    }

    function applyTheme() {
        document.documentElement.style.setProperty('--seed-h', Store.seed);
        document.body.className = Store.isDark ? 'dark-mode' : '';
        document.getElementById('btn-dark').innerText = Store.isDark ? 'toggle_on' : 'toggle_off';
    }

    function toggleModal(s) { document.getElementById('modal-settings').classList.toggle('active', s); }
    function toggleDark() { Store.isDark = !Store.isDark; localStorage.setItem('pro_dark', Store.isDark); applyTheme(); }

    document.getElementById('btn-theme').onclick = () => toggleModal(true);
    document.getElementById('btn-dark').onclick = toggleDark;
    document.getElementById('btn-loc').onclick = toggleLoc;
    
    let t;
    document.getElementById('input-city').oninput = (e) => {
        clearTimeout(t);
        t = setTimeout(() => searchCity(e.target.value), 400);
    };

    document.getElementById('box-palette').innerHTML = COLORS.map(c => 
        `<div class="color-dot" style="background:${c.c}" onclick="Store.seed=${c.h};localStorage.setItem('pro_seed',${c.h});applyTheme()"></div>`
    ).join('');

    applyTheme();
    updateLocUI();
    if(Store.tracking && !Store.manual) startLoc(true);
    fetchWeather(Store.city.id);

</script>
</body>
</html>
